<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>4000 Essential English Words 2 Test</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">4000 Essential English Words 2</p>
          <h1>단어 시험</h1>
          <p class="summary" id="dataSummary">단어 데이터를 불러오는 중입니다.</p>
        </div>
        <div class="score-card" aria-live="polite">
          <span>최근 점수</span>
          <strong id="lastScore">-</strong>
        </div>
      </section>

      <section class="dashboard">
        <div class="tabs" role="tablist" aria-label="보기 선택">
          <button class="tab active" id="setupTab" type="button" data-tab="setup">범위 설정</button>
          <button class="tab" id="quizTab" type="button" data-tab="quiz">시험 진행</button>
          <button class="tab" id="historyTab" type="button" data-tab="history">히스토리</button>
        </div>

        <section class="panel tab-panel active" id="setupPanel" aria-labelledby="setupTab">
          <div class="section-heading">
            <h2>WORD LIST 선택</h2>
            <span>단어 시험 가능한 페이지 범위만 표시됩니다.</span>
          </div>

          <div class="controls">
            <label>
              <span>페이지 범위</span>
              <input id="pageRange" type="text" inputmode="numeric" placeholder="예: 8 또는 8-15" />
            </label>
            <label>
              <span>문제 수</span>
              <input id="questionCount" type="number" min="1" step="1" placeholder="범위 내 전체" />
            </label>
            <label>
              <span>문제 유형</span>
              <select id="quizMode">
                <option value="mixed">섞어서</option>
                <option value="definition">정의 보고 단어 입력</option>
                <option value="blank">예문 빈칸 입력</option>
                <option value="choice">객관식 정의 고르기</option>
              </select>
            </label>
            <button id="startBtn" class="primary" type="button">시험 시작</button>
          </div>

          <div class="review-grid compact">
            <div>
              <span>출제 가능</span>
              <strong id="totalWords">0</strong>
            </div>
            <div>
              <span>선택 범위</span>
              <strong id="selectedWords">0</strong>
            </div>
            <div>
              <span>예정 문제</span>
              <strong id="plannedQuestions">0</strong>
            </div>
          </div>
          <p class="scope-summary" id="scopeSummary">전체 WORD LIST 기준</p>
          <div class="word-list-grid" id="wordListPages"></div>
        </section>

        <section class="panel tab-panel" id="quizPanel" aria-labelledby="quizTab">
          <div id="quizEmptyState" class="empty-state">
            범위 설정에서 시험을 시작하세요.
          </div>

          <div id="quizActiveState" hidden>
            <div class="quiz-summary">
              <span id="activeScopeText">전체 WORD LIST 기준</span>
              <strong id="progressText">0 / 0</strong>
            </div>

            <div class="question-meta">
              <span id="questionType">문제</span>
              <span id="unitBadge">페이지</span>
            </div>
            <div class="word-toolbar">
              <button id="speakBtn" class="listen-btn" type="button">듣기</button>
              <h2 id="questionText"></h2>
            </div>
            <button id="hintToggleBtn" class="hint-toggle" type="button">힌트 보기</button>
            <p id="questionHint" class="hint"></p>
            <div id="answerArea" class="answer-area"></div>
            <div class="actions">
              <button id="checkBtn" class="primary" type="button">채점</button>
              <button id="nextBtn" type="button" hidden>다음</button>
            </div>
            <p id="feedback" class="feedback" aria-live="polite"></p>
          </div>

          <div id="resultsPanel" class="results" hidden>
            <h2>결과</h2>
            <div class="result-score" id="resultScore"></div>
            <div id="missedList" class="missed-list"></div>
            <button id="retryBtn" class="primary" type="button">같은 설정으로 다시 풀기</button>
          </div>
        </section>

        <section class="panel tab-panel" id="historyPanel" aria-labelledby="historyTab">
          <div class="section-heading">
            <h2>시험 히스토리</h2>
            <span>이 기기의 브라우저에만 저장됩니다.</span>
          </div>
          <div class="history-stats">
            <div>
              <span>응시 횟수</span>
              <strong id="historyAttempts">0</strong>
            </div>
            <div>
              <span>평균 점수</span>
              <strong id="historyAverage">-</strong>
            </div>
            <div>
              <span>최고 점수</span>
              <strong id="historyBest">-</strong>
            </div>
            <div>
              <span>푼 문제</span>
              <strong id="historyQuestions">0</strong>
            </div>
          </div>
          <div class="history-actions">
            <button id="clearHistoryBtn" type="button">히스토리 삭제</button>
          </div>
          <div class="weak-words" id="historyWeakWords"></div>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
